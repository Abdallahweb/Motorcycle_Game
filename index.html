<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<title>Motorcycle Game</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    overflow:hidden;
    font-family:Arial, Helvetica, sans-serif;
    background:#111;
}

.game{

    width:100%;
    height:100vh;
    position:relative;
    overflow:hidden;

    background:url("street.gif");
    background-size:cover;
    background-position:center;

}

/* PLAYER */

.player{

    width:220px;
    position:absolute;
    bottom:20px;
    left:50%;
    transform:translateX(-50%);
    transition:0.15s;

}

/* ENEMY */

.enemy{

    width:220px;
    position:absolute;
    top:-300px;

}

/* SCORE */

.score{

    position:absolute;

    top:20px;
    left:50%;

    transform:translateX(-50%);

    color:white;

    font-size:40px;
    font-weight:bold;

    z-index:1000;

    text-shadow:2px 2px 10px black;

    background:rgba(0,0,0,.4);

    padding:10px 30px;

    border-radius:20px;

    backdrop-filter:blur(5px);

}

/* GAME OVER */

.game-over{

    position:absolute;
    inset:0;
    background:rgba(0,0,0,.8);

    display:none;

    justify-content:center;
    align-items:center;
    flex-direction:column;

    z-index:9999;

}

.game-over h1{

    color:white;
    font-size:80px;
    margin-bottom:20px;

}

.game-over button{

    padding:15px 40px;
    border:none;
    border-radius:10px;

    font-size:25px;
    cursor:pointer;

}

/* MOBILE BUTTONS */

.controls{

    position:absolute;
    bottom:20px;
    width:100%;
    display:flex;
    justify-content:space-between;
    padding:0 20px;
    z-index:999;

}

.controls button{

    width:150px;
    height:70px;

    border:none;
    border-radius:20px;

    font-size:30px;
    font-weight:bold;

    background:rgba(255,255,255,.3);
    color:white;

    backdrop-filter:blur(10px);
    cursor:pointer;

}

</style>

</head>

<body>

<div class="game" id="game">

    <!-- SCORE -->

    <div class="score" id="score">
        Score : 0
    </div>

    <!-- PLAYER -->

    <img src="motorcycle.gif"
    class="player"
    id="player">

    <!-- GAME OVER -->

    <div class="game-over"
    id="gameOver">

        <h1>GAME OVER</h1>

        <button onclick="restartGame()">
            Restart
        </button>

    </div>

    <!-- MOBILE CONTROLS -->

    <div class="controls">

        <button onclick="moveLeft()">
            ⇦
        </button>

        <button onclick="moveRight()">
            ⇨
        </button>

    </div>

</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script>

/* =========================
   ELEMENTS
========================= */

const game =
document.getElementById("game");

const player =
document.getElementById("player");

const scoreText =
document.getElementById("score");

const gameOverScreen =
document.getElementById("gameOver");

/* =========================
   VARIABLES
========================= */

const lanes = [5,25,45,65];

let currentLane = 1;

let enemies = [];

let score = 0;

let gameRunning = true;

let gameSpeed = 8;

/* =========================
   INITIAL
========================= */

player.style.left =
lanes[currentLane] + "%";

/* =========================
   MOVE PLAYER
========================= */

function moveLeft(){

    if(currentLane > 0){

        currentLane--;

        player.style.left =
        lanes[currentLane] + "%";

    }

}

function moveRight(){

    if(currentLane < lanes.length - 1){

        currentLane++;

        player.style.left =
        lanes[currentLane] + "%";

    }

}

/* =========================
   KEYBOARD
========================= */

document.addEventListener(
"keydown",
(e)=>{

    if(e.key === "ArrowLeft"){

        moveLeft();

    }

    if(e.key === "ArrowRight"){

        moveRight();

    }

});

/* =========================
   CREATE ENEMY
========================= */

function createEnemy(){

    if(!gameRunning) return;

    const enemy =
    document.createElement("img");

    enemy.classList.add("enemy");

    enemy.src =
    Math.random() > 0.5
    ? "police.png"
    : "police.png";

    const lane =
    Math.floor(
        Math.random() *
        lanes.length
    );

    enemy.dataset.lane = lane;

    enemy.style.left =
    lanes[lane] + "%";

    game.appendChild(enemy);

    enemies.push({

        element:enemy,
        y:-350

    });

}

/* =========================
   COLLISION
========================= */

function checkCollision(a,b){

    const aRect =
    a.getBoundingClientRect();

    const bRect =
    b.getBoundingClientRect();

    return !(

        aRect.bottom < bRect.top ||
        aRect.top > bRect.bottom ||
        aRect.right < bRect.left ||
        aRect.left > bRect.right

    );

}

/* =========================
   GAME LOOP
========================= */

function gameLoop(){

    if(!gameRunning) return;

    enemies.forEach((enemy,index)=>{

        enemy.y += gameSpeed;

        enemy.element.style.top =
        enemy.y + "px";

        /* COLLISION */

        if(
            checkCollision(
                player,
                enemy.element
            )
        ){

            endGame();

        }

        /* REMOVE */

        if(enemy.y >
        window.innerHeight){

            enemy.element.remove();

            enemies.splice(index,1);

            score++;

            scoreText.innerHTML =
            "Score : " + score;

            /* SPEED */

            if(score % 10 === 0){

                gameSpeed += 1;

            }

        }

    });

    requestAnimationFrame(
        gameLoop
    );

}

/* =========================
   GAME OVER
========================= */

function endGame(){

    gameRunning = false;

    gameOverScreen.style.display =
    "flex";

}

/* =========================
   RESTART
========================= */

function restartGame(){

    location.reload();

}

/* =========================
   ENEMY LOOP
========================= */

setInterval(()=>{

    createEnemy();

},1200);

/* =========================
   START
========================= */

gameLoop();
document.onkeydown = function (t) {

    return !t.ctrlKey ||
        (
            t.keyCode !== 67 &&
            t.keyCode !== 86 &&
            t.keyCode !== 85 &&
            t.keyCode !== 117
        );
};

$(document).keypress("u", function (t) {

    return !t.ctrlKey;

});

document.addEventListener("contextmenu", function (t) {

    t.preventDefault();

}, false);

$(document).keydown(function (t) {

    return t.keyCode != 123 &&
        (!t.ctrlKey || !t.shiftKey || t.keyCode != 73);

});

</script>

</body>
</html>
